name: Fetch Releases Daily

on:
  schedule:
    - cron: "0 9 * * *"  # runs every day at 9am UTC
  workflow_dispatch:       # lets you run it manually too from GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run fetch script
        run: python fetch_feeds.py

      - name: Commit and push new data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add releases.db
          git commit -m "daily release fetch" || echo "nothing new to commit"
          git push

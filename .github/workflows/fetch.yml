name: Fetch Releases Daily

on:
  schedule:
    - cron: "0 9 * * *"  # runs every day at 9am UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-dotenv anthropic

      - name: Run fetch script
        run: python3 fetch_feeds.py

      - name: Generate HTML
        run: python3 generate_html.py

      - name: Commit and push HTML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "update releases page" || echo "nothing new to commit"
          git push
